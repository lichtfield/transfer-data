<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <!-- Tambahkan viewport-fit=cover untuk layar HP dengan notch/poni -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>TransferData</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: #0a0c10;
      font-family: 'DM Sans', system-ui, sans-serif;
      /* KUNCI MASALAHNYA DI SINI: Jangan gunakan 100vh */
      /* Gunakan fixed dan inset: 0 agar layar benar-benar terkunci */
      position: fixed;
      inset: 0;
      overflow: hidden;
    }
    
    iframe {
      /* Gunakan absolute untuk memenuhi area body secara presisi */
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    
    .loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #00d4aa;
      font-size: 18px;
      z-index: 10;
    }
  </style>
</head>
<body>

  <div class="loading" id="loading">Memuat aplikasi...</div>

  <!-- GANTI DENGAN URL WEB APP KAMU -->
  <iframe src="https://script.google.com/macros/s/AKfycbxa-UwvZ52l5z2ZygKd_d7tEv5uIZwv5li1P-jjOXOfHnXCuhcWJTVj4_gq2p_EJpbuZA/exec" 
          onload="document.getElementById('loading').style.display='none';">
  </iframe>

</body>
</html>
